<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador Geográfico Profesional</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
<header>
<h1>🌍 Localizador Geográfico Global 🌍</h1>
<p>
Consumo de API OpenStreetMap con control de versiones integral.
<br>
Por Humberto Martinez Aragon – Grupo: IRIC - 93
</p>
</header>
<main>
<div class="search-container">
<input
type="text"
id="city-input"
placeholder="Introduce un lugar (Ej. Lerma, Toluca, Madrid...)">
<button id="search-btn">
Consultar API
</button>
</div>
<div id="weather-card" class="weather-card">
<p>
Introduce una ubicación para desplegar la información geográfica y climatológica.
</p>
</div>
<div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
